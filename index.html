<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HeiLog Final Ultimate</title>

<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f7f3ef;
color:#4b3d33;
}

.page{
display:none;
padding:20px;
padding-bottom:120px;
animation:fade .25s ease;
}

.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

h1{
font-size:34px;
}

.subtitle{
margin-top:6px;
color:#8f8177;
}

.avatar{
width:72px;
height:72px;
border-radius:50%;
background:#f1ddd0;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
height:125px;
border-radius:24px;
padding:18px;
display:flex;
flex-direction:column;
justify-content:space-between;
font-size:32px;
cursor:pointer;
transition:.15s;
}

.card:active{
transform:scale(.96);
}

.card span{
font-size:16px;
}

.peach{background:#fff0e5;}
.green{background:#ebf7e5;}
.purple{background:#efe8ff;}
.blue{background:#e9f4ff;}
.yellow{background:#fff6d8;}

.panel{
background:white;
border-radius:24px;
padding:18px;
margin-bottom:18px;
box-shadow:0 2px 12px rgba(0,0,0,.04);
}

.panel h2{
margin-bottom:16px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#f7f2ed;
margin-bottom:10px;
font-size:16px;
}

button{
border:none;
background:#c58f65;
color:white;
padding:14px;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
width:100%;
margin-top:8px;
}

button:active{
transform:scale(.98);
}

.secondary-btn{
background:#91a77c;
}

.delete-btn{
background:#f6dddd;
color:#8d4343;
width:auto;
padding:8px 12px;
font-size:14px;
}

.item{
background:#faf7f3;
padding:14px;
border-radius:16px;
margin-top:12px;
}

.item-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
}

.small{
font-size:13px;
color:#8a7d74;
margin-top:4px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-top:20px;
}

.day{
background:white;
border-radius:16px;
padding:10px 6px;
min-height:76px;
text-align:center;
font-size:13px;
cursor:pointer;
}

.day-number{
font-weight:700;
margin-bottom:6px;
}

.day-icons{
font-size:16px;
line-height:1.5;
}

.timeline-item{
background:#faf7f3;
padding:14px;
border-radius:16px;
margin-top:10px;
cursor:pointer;
}

.total{
font-size:42px;
font-weight:700;
margin-top:8px;
}

.table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

.table td{
padding:12px;
border-bottom:1px solid #eee;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:14px;
box-shadow:0 -2px 12px rgba(0,0,0,.06);
}

nav div{
text-align:center;
font-size:12px;
color:#7a6e64;
cursor:pointer;
}

.active-nav{
color:#c58f65;
font-weight:700;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999;
}

.modal-content{
background:white;
width:100%;
max-width:420px;
border-radius:28px;
padding:24px;
animation:pop .2s ease;
}

@keyframes pop{
from{
transform:scale(.92);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.modal-title{
font-size:24px;
font-weight:700;
margin-bottom:14px;
}

.close-btn{
margin-top:18px;
background:#ece7e2;
color:#4b3d33;
}

</style>

</head>

<body>

<div class="page active" id="homePage">

<div class="header">

<div>
<h1>HeiLog 🐾</h1>

<div class="subtitle">
Final Ultimate Version
</div>
</div>

<div class="avatar">
🐱
</div>

</div>

<div class="grid">

<div class="card peach"
onclick="showPage('foodPage',1)">
🍳
<span>Meals</span>
</div>

<div class="card green"
onclick="showPage('storePage',2)">
🛒
<span>Groceries</span>
</div>

<div class="card purple"
onclick="showPage('catPage',3)">
🐾
<span>Cat</span>
</div>

<div class="card blue"
onclick="showPage('calendarPage',4)">
📅
<span>Calendar</span>
</div>

<div class="card yellow"
onclick="showPage('statsPage',5)">
📊
<span>Stats</span>
</div>

</div>

</div>

<!-- FOOD -->

<div class="page" id="foodPage">

<div class="panel">

<h2>🍳 Meals</h2>

<input id="mealType"
placeholder="Breakfast / Lunch / Dinner">

<input id="mealFood"
placeholder="What did you eat?">

<input id="mealRestaurant"
placeholder="Restaurant">

<input id="mealPrice"
placeholder="Price">

<input
type="date"
id="mealDate">

<button onclick="addMeal()">
Add Meal
</button>

<div id="mealList"></div>

</div>

</div>

<!-- GROCERY -->

<div class="page" id="storePage">

<div class="panel">

<h2>🛒 Groceries</h2>

<input id="storeName"
placeholder="Store name">

<input id="storeItems"
placeholder="What did you buy?">

<input id="storePrice"
placeholder="Price">

<input
type="date"
id="storeDate">

<button onclick="addStore()">
Add Grocery
</button>

<div id="storeList"></div>

</div>

</div>

<!-- CAT -->

<div class="page" id="catPage">

<div class="panel">

<h2>🐾 Cat Supplies</h2>

<input id="catItem"
placeholder="Item">

<input id="catPrice"
placeholder="Price">

<input
type="date"
id="catDate">

<button onclick="addCat()">
Add Cat Item
</button>

<div id="catList"></div>

</div>

</div>

<!-- CALENDAR -->

<div class="page" id="calendarPage">

<div class="panel">

<h2>📅 Calendar</h2>

<div class="calendar-grid"
id="calendarGrid"></div>

</div>

<div class="panel">

<h2>🕒 Timeline</h2>

<div id="timeline"></div>

</div>

</div>

<!-- STATS -->

<div class="page" id="statsPage">

<div class="panel">

<div class="small">
Total Spending
</div>

<div class="total" id="totalPrice">
CAD $0
</div>

<canvas id="pieChart"
style="margin-top:20px;"></canvas>

<table class="table">

<tr>
<td>🍳 Food</td>
<td id="foodTotal">CAD $0</td>
</tr>

<tr>
<td>🛒 Grocery</td>
<td id="groceryTotal">CAD $0</td>
</tr>

<tr>
<td>🐾 Cat</td>
<td id="catTotal">CAD $0</td>
</tr>

</table>

<button onclick="exportBackup()">
☁️ Export Backup
</button>

<button
class="secondary-btn"
onclick="importBackup()">
📥 Restore Backup
</button>

<input
type="file"
id="backupFile"
accept=".json"
style="display:none;"
onchange="handleImport(event)">

</div>

</div>

<!-- NAV -->

<nav>

<div onclick="showPage('homePage',0)"
class="active-nav">
🏠<br>Home
</div>

<div onclick="showPage('foodPage',1)">
🍳<br>Meals
</div>

<div onclick="showPage('storePage',2)">
🛒<br>Store
</div>

<div onclick="showPage('catPage',3)">
🐾<br>Cats
</div>

<div onclick="showPage('calendarPage',4)">
📅<br>Calendar
</div>

<div onclick="showPage('statsPage',5)">
📊<br>Stats
</div>

</nav>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<div id="modalContent"></div>

<button
class="close-btn"
onclick="closeModal()">
Close
</button>

</div>

</div>

<script>

let records =
JSON.parse(
localStorage.getItem("records")
) || [];

let pieChart;

function saveRecords(){

localStorage.setItem(
"records",
JSON.stringify(records)
);

}

function showPage(pageId,index){

document.querySelectorAll(".page")
.forEach(page=>{
page.classList.remove("active");
});

document.getElementById(pageId)
.classList.add("active");

document.querySelectorAll("nav div")
.forEach(nav=>{
nav.classList.remove("active-nav");
});

document.querySelectorAll("nav div")[index]
.classList.add("active-nav");

renderAll();

}

function addMeal(){

const type =
document.getElementById("mealType");

const food =
document.getElementById("mealFood");

const restaurant =
document.getElementById("mealRestaurant");

const price =
document.getElementById("mealPrice");

const date =
document.getElementById("mealDate");

if(food.value==="") return;

records.unshift({

id:Date.now(),

category:"food",

meal:type.value,

food:food.value,

restaurant:restaurant.value,

price:Number(price.value || 0),

date:
date.value ||
new Date().toISOString()

});

saveRecords();

type.value="";
food.value="";
restaurant.value="";
price.value="";
date.value="";

renderAll();

}

function addStore(){

const name =
document.getElementById("storeName");

const items =
document.getElementById("storeItems");

const price =
document.getElementById("storePrice");

const date =
document.getElementById("storeDate");

if(name.value==="") return;

records.unshift({

id:Date.now(),

category:"grocery",

store:name.value,

items:items.value,

price:Number(price.value || 0),

date:
date.value ||
new Date().toISOString()

});

saveRecords();

name.value="";
items.value="";
price.value="";
date.value="";

renderAll();

}

function addCat(){

const item =
document.getElementById("catItem");

const price =
document.getElementById("catPrice");

const date =
document.getElementById("catDate");

if(item.value==="") return;

records.unshift({

id:Date.now(),

category:"cat",

item:item.value,

price:Number(price.value || 0),

date:
date.value ||
new Date().toISOString()

});

saveRecords();

item.value="";
price.value="";
date.value="";

renderAll();

}

function deleteRecord(id){

records =
records.filter(
record=>record.id!==id
);

saveRecords();

renderAll();

closeModal();

}

function openRecord(id){

const record =
records.find(
r=>r.id===id
);

if(!record) return;

const formattedDate =
new Date(record.date)
.toLocaleDateString();

let html = "";

if(record.category==="food"){

html = `
<div class="modal-title">
🍳 ${record.meal}
</div>

<div>
${record.food}
</div>

<div class="small">
📍 ${record.restaurant}
</div>

<div class="small">
💲 CAD $${record.price}
</div>

<div class="small">
📅 ${formattedDate}
</div>

<button
onclick="deleteRecord(${record.id})"
style="margin-top:20px;background:#f4d7d7;color:#8a3e3e;">
Delete
</button>
`;

}

if(record.category==="grocery"){

html = `
<div class="modal-title">
🛒 ${record.store}
</div>

<div>
${record.items}
</div>

<div class="small">
💲 CAD $${record.price}
</div>

<div class="small">
📅 ${formattedDate}
</div>

<button
onclick="deleteRecord(${record.id})"
style="margin-top:20px;background:#f4d7d7;color:#8a3e3e;">
Delete
</button>
`;

}

if(record.category==="cat"){

html = `
<div class="modal-title">
🐾 Cat Supply
</div>

<div>
${record.item}
</div>

<div class="small">
💲 CAD $${record.price}
</div>

<div class="small">
📅 ${formattedDate}
</div>

<button
onclick="deleteRecord(${record.id})"
style="margin-top:20px;background:#f4d7d7;color:#8a3e3e;">
Delete
</button>
`;

}

document.getElementById("modalContent")
.innerHTML = html;

document.getElementById("modal")
.style.display = "flex";

}

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

function renderMeals(){

const mealList =
document.getElementById("mealList");

mealList.innerHTML="";

records
.filter(r=>r.category==="food")
.forEach(record=>{

mealList.innerHTML += `
<div class="item">

<div class="item-top">

<div>

<strong>
${record.meal}
</strong>

<div>
${record.food}
</div>

<div class="small">
📍 ${record.restaurant}
</div>

<div class="small">
💲 CAD $${record.price}
</div>

</div>

<button
class="delete-btn"
onclick="deleteRecord(${record.id})">
🗑️
</button>

</div>

</div>
`;

});

}

function renderStores(){

const storeList =
document.getElementById("storeList");

storeList.innerHTML="";

records
.filter(r=>r.category==="grocery")
.forEach(record=>{

storeList.innerHTML += `
<div class="item">

<div class="item-top">

<div>

<strong>
${record.store}
</strong>

<div>
${record.items}
</div>

<div class="small">
💲 CAD $${record.price}
</div>

</div>

<button
class="delete-btn"
onclick="deleteRecord(${record.id})">
🗑️
</button>

</div>

</div>
`;

});

}

function renderCats(){

const catList =
document.getElementById("catList");

catList.innerHTML="";

records
.filter(r=>r.category==="cat")
.forEach(record=>{

catList.innerHTML += `
<div class="item">

<div class="item-top">

<div>

<strong>
${record.item}
</strong>

<div class="small">
💲 CAD $${record.price}
</div>

</div>

<button
class="delete-btn"
onclick="deleteRecord(${record.id})">
🗑️
</button>

</div>

</div>
`;

});

}

function renderTimeline(){

const timeline =
document.getElementById("timeline");

timeline.innerHTML="";

records.slice(0,20).forEach(record=>{

let icon="🍳";

if(record.category==="grocery"){
icon="🛒";
}

if(record.category==="cat"){
icon="🐾";
}

const formattedDate =
new Date(record.date)
.toLocaleDateString();

timeline.innerHTML += `
<div
class="timeline-item"
onclick="openRecord(${record.id})">

<strong>
${icon}
</strong>

<div class="small">
${formattedDate}
</div>

</div>
`;

});

}

function renderCalendar(){

const grid =
document.getElementById("calendarGrid");

grid.innerHTML="";

const today = new Date();

const currentMonth =
today.getMonth();

const currentYear =
today.getFullYear();

const daysInMonth =
new Date(
currentYear,
currentMonth + 1,
0
).getDate();

for(let i=1;i<=daysInMonth;i++){

let icons="";

records.forEach(record=>{

const recordDate =
new Date(record.date);

const recordDay =
recordDate.getDate();

const recordMonth =
recordDate.getMonth();

const recordYear =
recordDate.getFullYear();

if(
recordDay===i &&
recordMonth===currentMonth &&
recordYear===currentYear
){

if(record.category==="food"){
icons += "🍳 ";
}

if(record.category==="grocery"){
icons += "🛒 ";
}

if(record.category==="cat"){
icons += "🐾 ";
}

}

});

grid.innerHTML += `
<div class="day">

<div class="day-number">
${i}
</div>

<div class="day-icons">
${icons}
</div>

</div>
`;

}

}

function renderStats(){

let food=0;
let grocery=0;
let cat=0;

records.forEach(record=>{

if(record.category==="food"){
food+=record.price;
}

if(record.category==="grocery"){
grocery+=record.price;
}

if(record.category==="cat"){
cat+=record.price;
}

});

const total =
food + grocery + cat;

document.getElementById("totalPrice")
.innerHTML =
"CAD $" + total.toFixed(2);

document.getElementById("foodTotal")
.innerHTML =
"CAD $" + food.toFixed(2);

document.getElementById("groceryTotal")
.innerHTML =
"CAD $" + grocery.toFixed(2);

document.getElementById("catTotal")
.innerHTML =
"CAD $" + cat.toFixed(2);

const ctx =
document.getElementById("pieChart");

if(pieChart){
pieChart.destroy();
}

pieChart = new Chart(ctx,{

type:"pie",

data:{

labels:[
"Food",
"Grocery",
"Cat"
],

datasets:[{

data:[
food,
grocery,
cat
],

backgroundColor:[
"#ffd6b8",
"#cfecc4",
"#dcd1ff"
]

}]

}

});

}

function exportBackup(){

const backupData = {

records:records,

exportedAt:
new Date().toISOString()

};

const dataStr =
JSON.stringify(
backupData,
null,
2
);

const blob =
new Blob(
[dataStr],
{
type:"application/json"
}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =
"heilog-backup.json";

a.click();

URL.revokeObjectURL(url);

alert("Backup exported!");

}

function importBackup(){

document
.getElementById("backupFile")
.click();

}

function handleImport(event){

const file =
event.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(e){

try{

const data =
JSON.parse(e.target.result);

if(data.records){

records =
data.records;

saveRecords();

renderAll();

alert("Backup restored!");

}

}catch(error){

alert("Import failed");

}

};

reader.readAsText(file);

}

function renderAll(){

renderMeals();
renderStores();
renderCats();
renderTimeline();
renderCalendar();
renderStats();

}

renderAll();

</script>

</body>
</html>
