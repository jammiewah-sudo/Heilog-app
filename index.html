<!DOCTYPE html>

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>HeiLog</title>

<link rel="manifest" href="manifest.json">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f8f3ee;
color:#4b3b31;

}

.container{

}

}

.subtitle{

}

.card{

.purple{

.yellow{

}

nav{

</style>
</head>

<body>

<div class="container">

<div class="header">
<div>
<h1>HeiLog 🐾</h1>
<div class="subtitle">
記錄生活・飲食・超市・貓咪用品
</div>
</div>

<div class="avatar">
🐱
</div>
</div>

<div class="grid">

<div class="card peach">
🍳
<span>每日飲食</span>
</div>

<div class="card green">
🛒
<span>超市記錄</span>
</div>

<div class="card purple">
🐾
<span>貓咪用品</span>
</div>

<div class="card yellow">
📊
<span>生活統計</span>
</div>

</div>

<!-- 飲食記錄 -->

<div class="panel">

<h2>🍱 今日飲食記錄</h2>

<!-- 早餐 -->

<div class="meal">
<div class="meal-title">早餐</div>

<input id="breakfastInput" placeholder="早餐食咗咩？">

<button onclick="addMeal('breakfast')">
新增早餐
</button>

<div id="breakfastList"></div>
</div>

<!-- 午餐 -->

<div class="meal">
<div class="meal-title">午餐</div>

<input id="lunchInput" placeholder="午餐食咗咩？">

<button onclick="addMeal('lunch')">
新增午餐
</button>

<div id="lunchList"></div>
</div>

<!-- 晚餐 -->

<div class="meal">
<div class="meal-title">晚餐</div>

<input id="dinnerInput" placeholder="晚餐食咗咩？">

<button onclick="addMeal('dinner')">
新增晚餐
</button>

<div id="dinnerList"></div>
</div>

</div>

<!-- 超市 -->

<div class="panel">

<h2>🛒 超市記錄</h2>

<input id="storeName" placeholder="邊間超市？">
<input id="storeItems" placeholder="買咗啲乜？">
<input id="storePrice" placeholder="幾錢？">

<button onclick="addStore()">
新增超市記錄
</button>

<div id="storeList"></div>

</div>

<!-- 貓咪用品 -->

<div class="panel">

<h2>🐱 貓咪用品</h2>

<input id="catItem" placeholder="用品名稱">
<input id="catDate" placeholder="購買日期">

<button onclick="addCat()">
新增用品
</button>

<div id="catList"></div>

</div>

<!-- 統計 -->

<div class="panel">

<h2>📊 本月統計</h2>

<div class="small">超市總開支</div>

<div class="total" id="totalPrice">
CAD $0
</div>

</div>

</div>

<nav>

<div>
🏠
<br>
首頁
</div>

<div>
🍱
<br>
飲食
</div>

<div>
🛒
<br>
超市
</div>

<div>
🐾
<br>
貓咪
</div>

</nav>

<script>

let total = localStorage.getItem("totalPrice") || 0;
document.getElementById("totalPrice").innerHTML = "CAD $" + total;

function saveData(key, value){
localStorage.setItem(key, value);
}

function loadData(key, element){
const data = localStorage.getItem(key);

if(data){
document.getElementById(element).innerHTML = data;
}
}

function addMeal(type){

const input = document.getElementById(type + "Input");
const list = document.getElementById(type + "List");

if(input.value === "") return;

const item = document.createElement("div");

item.className = "item";

item.innerHTML = `
<strong>${input.value}</strong>
<div class="small">${new Date().toLocaleTimeString()}</div>
`;

list.prepend(item);

saveData(type, list.innerHTML);

input.value = "";

}

function addStore(){

const name = document.getElementById("storeName");
const items = document.getElementById("storeItems");
const price = document.getElementById("storePrice");

if(name.value === "" || items.value === "") return;

const list = document.getElementById("storeList");

const item = document.createElement("div");

item.className = "item";

item.innerHTML = `
<strong>${name.value}</strong>
<div>${items.value}</div>
<div class="small">CAD $${price.value}</div>
`;

list.prepend(item);

saveData("stores", list.innerHTML);

total = Number(total) + Number(price.value || 0);

document.getElementById("totalPrice").innerHTML = "CAD $" + total;

localStorage.setItem("totalPrice", total);

name.value = "";
items.value = "";
price.value = "";

}

function addCat(){

const catItem = document.getElementById("catItem");
const catDate = document.getElementById("catDate");

if(catItem.value === "") return;

const list = document.getElementById("catList");

const item = document.createElement("div");

item.className = "item";

item.innerHTML = `
<strong>${catItem.value}</strong>
<div class="small">購買日期：${catDate.value}</div>
`;

list.prepend(item);

saveData("cats", list.innerHTML);

catItem.value = "";
catDate.value = "";

}

window.onload = function(){

loadData("breakfast","breakfastList");
loadData("lunch","lunchList");
loadData("dinner","dinnerList");
loadData("stores","storeList");
loadData("cats","catList");

}

</script>

</body>
</html>
