<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HeiLog Ultimate v6</title>

<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f7f3ef;
color:#4b3d33;
}

.page{
display:none;
padding:20px;
padding-bottom:120px;
animation:fade .25s ease;
}

.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

h1{
font-size:34px;
}

.subtitle{
margin-top:6px;
color:#8f8177;
}

.avatar{
width:72px;
height:72px;
border-radius:50%;
background:#f1ddd0;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
height:125px;
border-radius:24px;
padding:18px;
display:flex;
flex-direction:column;
justify-content:space-between;
font-size:32px;
cursor:pointer;
transition:.15s;
}

.card span{
font-size:16px;
}

.peach{background:#fff0e5;}
.green{background:#ebf7e5;}
.purple{background:#efe8ff;}
.blue{background:#e9f4ff;}
.yellow{background:#fff6d8;}

.panel{
background:white;
border-radius:24px;
padding:18px;
margin-bottom:18px;
box-shadow:0 2px 12px rgba(0,0,0,.04);
}

.panel h2{
margin-bottom:16px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#f7f2ed;
margin-bottom:10px;
font-size:16px;
}

button{
border:none;
background:#c58f65;
color:white;
padding:14px;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
width:100%;
margin-top:8px;
}

.secondary-btn{
background:#91a77c;
}

.small-btn{
width:auto;
padding:8px 14px;
margin:0;
font-size:14px;
}

.delete-btn{
background:#f6dddd;
color:#8d4343;
}

.item{
background:#faf7f3;
padding:14px;
border-radius:16px;
margin-top:12px;
}

.item-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
}

.small{
font-size:13px;
color:#8a7d74;
margin-top:4px;
}

.calendar-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
background:white;
border-radius:16px;
padding:10px 6px;
min-height:80px;
text-align:center;
font-size:13px;
cursor:pointer;
}

.day-number{
font-weight:700;
margin-bottom:6px;
}

.day-icons{
font-size:16px;
line-height:1.5;
}

.timeline-item{
background:#faf7f3;
padding:14px;
border-radius:16px;
margin-top:10px;
cursor:pointer;
}

.total{
font-size:42px;
font-weight:700;
margin-top:8px;
}

.table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

.table td{
padding:12px;
border-bottom:1px solid #eee;
}

.month-card{
background:#faf7f3;
padding:16px;
border-radius:18px;
margin-top:12px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:14px;
box-shadow:0 -2px 12px rgba(0,0,0,.06);
}

nav div{
text-align:center;
font-size:12px;
color:#7a6e64;
cursor:pointer;
}

.active-nav{
color:#c58f65;
font-weight:700;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.35);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999;
}

.modal-content{
background:white;
width:100%;
max-width:420px;
border-radius:28px;
padding:24px;
max-height:90vh;
overflow:auto;
}

.modal-title{
font-size:24px;
font-weight:700;
margin-bottom:14px;
}

.close-btn{
margin-top:18px;
background:#ece7e2;
color:#4b3d33;
}

</style>

</head>

<body>

<!-- HOME -->

<div class="page active" id="homePage">

<div class="header">

<div>
<h1>HeiLog 🐾</h1>
<div class="subtitle">
Ultimate v6
</div>
</div>

<div class="avatar">
🐱
</div>

</div>

<div class="grid">

<div class="card peach"
onclick="showPage('foodPage',1)">
🍳
<span>Meals</span>
</div>

<div class="card green"
onclick="showPage('storePage',2)">
🛒
<span>Groceries</span>
</div>

<div class="card purple"
onclick="showPage('catPage',3)">
🐾
<span>Cat</span>
</div>

<div class="card blue"
onclick="showPage('calendarPage',4)">
📅
<span>Calendar</span>
</div>

<div class="card yellow"
onclick="showPage('statsPage',5)">
📊
<span>Stats</span>
</div>

</div>

</div>

<!-- FOOD -->

<div class="page" id="foodPage">

<div class="panel">

<h2>🍳 Meals</h2>

<input id="mealType"
placeholder="Breakfast / Lunch / Dinner">

<input id="mealFood"
placeholder="What did you eat?">

<input id="mealRestaurant"
placeholder="Restaurant">

<input id="mealPrice"
placeholder="Price">

<input type="date"
id="mealDate">

<button onclick="addMeal()">
Add Meal
</button>

<div id="mealList"></div>

</div>

</div>

<!-- STORE -->

<div class="page" id="storePage">

<div class="panel">

<h2>🛒 Groceries</h2>

<input id="storeName"
placeholder="Store name">

<input id="storeItems"
placeholder="What did you buy?">

<input id="storePrice"
placeholder="Price">

<input type="date"
id="storeDate">

<button onclick="addStore()">
Add Grocery
</button>

<div id="storeList"></div>

</div>

</div>

<!-- CAT -->

<div class="page" id="catPage">

<div class="panel">

<h2>🐾 Cat Supplies</h2>

<input id="catItem"
placeholder="Item">

<input id="catPrice"
placeholder="Price">

<input type="date"
id="catDate">

<button onclick="addCat()">
Add Cat Item
</button>

<div id="catList"></div>

</div>

</div>

<!-- CALENDAR -->

<div class="page" id="calendarPage">

<div class="panel">

<div class="calendar-top">

<button
class="small-btn"
onclick="changeMonth(-1)">
←
</button>

<h2 id="calendarTitle">
Month
</h2>

<button
class="small-btn"
onclick="changeMonth(1)">
→
</button>

</div>

<div class="calendar-grid"
id="calendarGrid"></div>

</div>

<div class="panel">

<h2>🕒 Timeline</h2>

<div id="timeline"></div>

</div>

</div>

<!-- STATS -->

<div class="page" id="statsPage">

<div class="panel">

<div class="small">
Current Month Total
</div>

<div class="total"
id="totalPrice">
CAD $0
</div>

<canvas id="pieChart"
style="margin-top:20px;"></canvas>

<table class="table">

<tr>
<td>🍳 Food</td>
<td id="foodTotal">CAD $0</td>
</tr>

<tr>
<td>🛒 Grocery</td>
<td id="groceryTotal">CAD $0</td>
</tr>

<tr>
<td>🐾 Cat</td>
<td id="catTotal">CAD $0</td>
</tr>

</table>

</div>

<div class="panel">

<h2>📅 Monthly History</h2>

<div id="monthlyHistory"></div>

</div>

</div>

<!-- NAV -->

<nav>

<div onclick="showPage('homePage',0)"
class="active-nav">
🏠<br>Home
</div>

<div onclick="showPage('foodPage',1)">
🍳<br>Meals
</div>

<div onclick="showPage('storePage',2)">
🛒<br>Store
</div>

<div onclick="showPage('catPage',3)">
🐾<br>Cats
</div>

<div onclick="showPage('calendarPage',4)">
📅<br>Calendar
</div>

<div onclick="showPage('statsPage',5)">
📊<br>Stats
</div>

</nav>

<!-- MODAL -->

<div class="modal"
id="modal">

<div class="modal-content">

<div id="modalContent"></div>

<button
class="close-btn"
onclick="closeModal()">
Close
</button>

</div>

</div>

<script>

let records =
JSON.parse(
localStorage.getItem("records")
) || [];

let pieChart;

let currentMonth =
new Date().getMonth();

let currentYear =
new Date().getFullYear();

function saveRecords(){

localStorage.setItem(
"records",
JSON.stringify(records)
);

}

function showPage(pageId,index){

document.querySelectorAll(".page")
.forEach(page=>{
page.classList.remove("active");
});

document.getElementById(pageId)
.classList.add("active");

document.querySelectorAll("nav div")
.forEach(nav=>{
nav.classList.remove("active-nav");
});

document.querySelectorAll("nav div")[index]
.classList.add("active-nav");

renderAll();

}

function addMeal(){

records.unshift({

id:Date.now(),

category:"food",

meal:
document.getElementById("mealType").value,

food:
document.getElementById("mealFood").value,

restaurant:
document.getElementById("mealRestaurant").value,

price:Number(
document.getElementById("mealPrice").value || 0
),

date:
document.getElementById("mealDate").value ||
new Date().toISOString().split("T")[0]

});

saveRecords();

renderAll();

}

function addStore(){

records.unshift({

id:Date.now(),

category:"grocery",

store:
document.getElementById("storeName").value,

items:
document.getElementById("storeItems").value,

price:Number(
document.getElementById("storePrice").value || 0
),

date:
document.getElementById("storeDate").value ||
new Date().toISOString().split("T")[0]

});

saveRecords();

renderAll();

}

function addCat(){

records.unshift({

id:Date.now(),

category:"cat",

item:
document.getElementById("catItem").value,

price:Number(
document.getElementById("catPrice").value || 0
),

date:
document.getElementById("catDate").value ||
new Date().toISOString().split("T")[0]

});

saveRecords();

renderAll();

}

function renderMeals(){

const mealList =
document.getElementById("mealList");

mealList.innerHTML="";

records
.filter(r=>r.category==="food")
.forEach(record=>{

mealList.innerHTML += `
<div class="item">

<div class="item-top">

<div>

<strong>
${record.food}
</strong>

<div class="small">
${record.meal}
</div>

<div class="small">
📍 ${record.restaurant}
</div>

<div class="small">
📅 ${record.date}
</div>

<div class="small">
CAD $${record.price}
</div>

</div>

<button
class="small-btn"
onclick="openRecord(${record.id})">
✏️
</button>

</div>

</div>
`;

});

}

function renderStores(){

const storeList =
document.getElementById("storeList");

storeList.innerHTML="";

records
.filter(r=>r.category==="grocery")
.forEach(record=>{

storeList.innerHTML += `
<div class="item">

<div class="item-top">

<div>

<strong>
${record.store}
</strong>

<div class="small">
${record.items}
</div>

<div class="small">
📅 ${record.date}
</div>

<div class="small">
CAD $${record.price}
</div>

</div>

<button
class="small-btn"
onclick="openRecord(${record.id})">
✏️
</button>

</div>

</div>
`;

});

}

function renderCats(){

const catList =
document.getElementById("catList");

catList.innerHTML="";

records
.filter(r=>r.category==="cat")
.forEach(record=>{

catList.innerHTML += `
<div class="item">

<div class="item-top">

<div>

<strong>
${record.item}
</strong>

<div class="small">
📅 ${record.date}
</div>

<div class="small">
CAD $${record.price}
</div>

</div>

<button
class="small-btn"
onclick="openRecord(${record.id})">
✏️
</button>

</div>

</div>
`;

});

}

function openRecord(id){

const record =
records.find(r=>r.id===id);

let html="";

if(record.category==="food"){

html = `

<div class="modal-title">
✏️ Edit Meal
</div>

<input id="editMealFood"
value="${record.food}">

<input id="editMealType"
value="${record.meal}">

<input id="editMealRestaurant"
value="${record.restaurant}">

<input id="editMealPrice"
value="${record.price}">

<input type="date"
id="editMealDate"
value="${record.date}">

<button onclick="saveMealEdit(${record.id})">
Save
</button>

<button
class="delete-btn"
onclick="deleteRecord(${record.id})">
Delete
</button>

`;

}

if(record.category==="grocery"){

html = `

<div class="modal-title">
✏️ Edit Grocery
</div>

<input id="editStoreName"
value="${record.store}">

<input id="editStoreItems"
value="${record.items}">

<input id="editStorePrice"
value="${record.price}">

<input type="date"
id="editStoreDate"
value="${record.date}">

<button onclick="saveStoreEdit(${record.id})">
Save
</button>

<button
class="delete-btn"
onclick="deleteRecord(${record.id})">
Delete
</button>

`;

}

if(record.category==="cat"){

html = `

<div class="modal-title">
✏️ Edit Cat
</div>

<input id="editCatItem"
value="${record.item}">

<input id="editCatPrice"
value="${record.price}">

<input type="date"
id="editCatDate"
value="${record.date}">

<button onclick="saveCatEdit(${record.id})">
Save
</button>

<button
class="delete-btn"
onclick="deleteRecord(${record.id})">
Delete
</button>

`;

}

document.getElementById("modalContent")
.innerHTML = html;

document.getElementById("modal")
.style.display = "flex";

}

function saveMealEdit(id){

const record =
records.find(r=>r.id===id);

record.food =
document.getElementById("editMealFood").value;

record.meal =
document.getElementById("editMealType").value;

record.restaurant =
document.getElementById("editMealRestaurant").value;

record.price =
Number(document.getElementById("editMealPrice").value);

record.date =
document.getElementById("editMealDate").value;

saveRecords();

renderAll();

closeModal();

}

function saveStoreEdit(id){

const record =
records.find(r=>r.id===id);

record.store =
document.getElementById("editStoreName").value;

record.items =
document.getElementById("editStoreItems").value;

record.price =
Number(document.getElementById("editStorePrice").value);

record.date =
document.getElementById("editStoreDate").value;

saveRecords();

renderAll();

closeModal();

}

function saveCatEdit(id){

const record =
records.find(r=>r.id===id);

record.item =
document.getElementById("editCatItem").value;

record.price =
Number(document.getElementById("editCatPrice").value);

record.date =
document.getElementById("editCatDate").value;

saveRecords();

renderAll();

closeModal();

}

function deleteRecord(id){

records =
records.filter(r=>r.id!==id);

saveRecords();

renderAll();

closeModal();

}

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

function changeMonth(direction){

currentMonth += direction;

if(currentMonth<0){

currentMonth=11;
currentYear--;

}

if(currentMonth>11){

currentMonth=0;
currentYear++;

}

renderCalendar();
renderTimeline();
renderStats();

}

function renderCalendar(){

const grid =
document.getElementById("calendarGrid");

grid.innerHTML="";

const monthNames = [
"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"
];

document.getElementById("calendarTitle")
.innerHTML =
monthNames[currentMonth] + " " + currentYear;

const daysInMonth =
new Date(
currentYear,
currentMonth + 1,
0
).getDate();

for(let i=1;i<=daysInMonth;i++){

let icons="";

const dayRecords =
records.filter(record=>{

const parts =
record.date.split("-");

const y = Number(parts[0]);
const m = Number(parts[1]) - 1;
const d = Number(parts[2]);

return (
d===i &&
m===currentMonth &&
y===currentYear
);

});

dayRecords.forEach(record=>{

if(record.category==="food"){
icons+="🍳 ";
}

if(record.category==="grocery"){
icons+="🛒 ";
}

if(record.category==="cat"){
icons+="🐾 ";
}

});

grid.innerHTML += `

<div
class="day"
onclick="openDayRecords(${i})">

<div class="day-number">
${i}
</div>

<div class="day-icons">
${icons}
</div>

</div>

`;

}

}

function openDayRecords(day){

const filtered =
records.filter(record=>{

const parts =
record.date.split("-");

const y = Number(parts[0]);
const m = Number(parts[1]) - 1;
const d = Number(parts[2]);

return (
d===day &&
m===currentMonth &&
y===currentYear
);

});

let html = `
<div class="modal-title">
📅 Day ${day}
</div>
`;

if(filtered.length===0){

html += `
<div class="small">
No records
</div>
`;

}else{

filtered.forEach(record=>{

let title = "";

if(record.category==="food"){
title="🍳 " + record.food;
}

if(record.category==="grocery"){
title="🛒 " + record.items;
}

if(record.category==="cat"){
title="🐾 " + record.item;
}

html += `

<div
style="
background:#f7f2ed;
padding:14px;
border-radius:14px;
margin-top:10px;
cursor:pointer;
"
onclick="openRecord(${record.id})">

<strong>
${title}
</strong>

<div class="small">
CAD $${record.price}
</div>

</div>

`;

});

}

document.getElementById("modalContent")
.innerHTML = html;

document.getElementById("modal")
.style.display = "flex";

}

function renderTimeline(){

const timeline =
document.getElementById("timeline");

timeline.innerHTML="";

const filtered =
records.filter(record=>{

const parts =
record.date.split("-");

const y = Number(parts[0]);
const m = Number(parts[1]) - 1;

return (
m===currentMonth &&
y===currentYear
);

});

filtered.forEach(record=>{

let icon="🍳";
let title="";

if(record.category==="food"){
icon="🍳";
title=record.food;
}

if(record.category==="grocery"){
icon="🛒";
title=record.items;
}

if(record.category==="cat"){
icon="🐾";
title=record.item;
}

timeline.innerHTML += `

<div
class="timeline-item"
onclick="openRecord(${record.id})">

<strong>
${icon} ${title}
</strong>

<div class="small">
${record.date}
</div>

</div>

`;

});

}

function renderStats(){

let food=0;
let grocery=0;
let cat=0;

records.forEach(record=>{

const parts =
record.date.split("-");

const y = Number(parts[0]);
const m = Number(parts[1]) - 1;

if(
m===currentMonth &&
y===currentYear
){

if(record.category==="food"){
food+=record.price;
}

if(record.category==="grocery"){
grocery+=record.price;
}

if(record.category==="cat"){
cat+=record.price;
}

}

});

const total =
food + grocery + cat;

document.getElementById("totalPrice")
.innerHTML =
"CAD $" + total.toFixed(2);

document.getElementById("foodTotal")
.innerHTML =
"CAD $" + food.toFixed(2);

document.getElementById("groceryTotal")
.innerHTML =
"CAD $" + grocery.toFixed(2);

document.getElementById("catTotal")
.innerHTML =
"CAD $" + cat.toFixed(2);

const ctx =
document.getElementById("pieChart");

if(pieChart){
pieChart.destroy();
}

pieChart = new Chart(ctx,{

type:"pie",

data:{

labels:[
"Food",
"Grocery",
"Cat"
],

datasets:[{

data:[
food,
grocery,
cat
],

backgroundColor:[
"#ffd6b8",
"#cfecc4",
"#dcd1ff"
]

}]

}

});

renderMonthlyHistory();

}

function renderMonthlyHistory(){

const container =
document.getElementById("monthlyHistory");

container.innerHTML="";

const months = {};

records.forEach(record=>{

const parts =
record.date.split("-");

const key =
parts[0] + "-" + parts[1];

if(!months[key]){
months[key]=0;
}

months[key]+=record.price;

});

Object.keys(months)
.sort()
.reverse()
.forEach(month=>{

container.innerHTML += `

<div
class="month-card"
onclick="openMonthDetails('${month}')">

<div>
<strong>
${month}
</strong>
</div>

<div>
CAD $${months[month].toFixed(2)}
</div>

</div>

`;

});

}

function openMonthDetails(month){

const filtered =
records.filter(record=>{

return record.date.startsWith(month);

});

let total=0;

let html = `
<div class="modal-title">
📊 ${month}
</div>
`;

filtered.forEach(record=>{

total += record.price;

let title="";

if(record.category==="food"){
title="🍳 " + record.food;
}

if(record.category==="grocery"){
title="🛒 " + record.items;
}

if(record.category==="cat"){
title="🐾 " + record.item;
}

html += `

<div
style="
background:#f7f2ed;
padding:14px;
border-radius:14px;
margin-top:10px;
">

<strong>
${title}
</strong>

<div class="small">
${record.date}
</div>

<div class="small">
CAD $${record.price}
</div>

</div>

`;

});

html += `

<div
style="
margin-top:20px;
font-weight:700;
font-size:20px;
">
Total:
CAD $${total.toFixed(2)}
</div>

`;

document.getElementById("modalContent")
.innerHTML = html;

document.getElementById("modal")
.style.display = "flex";

}

function renderAll(){

renderMeals();
renderStores();
